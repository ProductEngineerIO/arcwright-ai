name: Publish to TestPyPI

on:
  push:
    tags: ["v*"]

permissions:
  id-token: write # Required for trusted publishing

jobs:
  build:
    runs-on: ubuntu-latest
    # Only publish pre-release versions (tags containing a, b, or rc suffix)
    if: ${{ contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'rc') }}
    defaults:
      run:
        working-directory: arcwright-ai
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # hatch-vcs needs full git history to resolve version
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: arcwright-ai/dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
