repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        files: ^src/
        additional_dependencies:
          [
            pydantic>=2.7,
            typer>=0.12,
            pyyaml,
            types-PyYAML,
            python-dotenv,
            langgraph,
            claude-code-sdk,
          ]
        args: [--strict, --config-file=pyproject.toml]
