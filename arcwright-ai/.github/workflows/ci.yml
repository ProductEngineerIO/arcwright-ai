name: CI
on: [push, pull_request]
jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs needs full history to resolve version
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      # Use pre-commit hooks so local and CI Ruff versions stay consistent.
      - run: pre-commit run ruff --all-files
      - run: pre-commit run ruff-format --all-files
      - run: mypy --strict src/
      # Exit code 5 = no tests collected; acceptable until Epic 1 stories add tests
      - run: pytest || [ $? -eq 5 ]
